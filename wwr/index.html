<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - White Water Rafting</title>
  <meta name="description" content="Explore exciting white water rafting adventures, sign up for our newsletter, and discover our trips.">
  <link rel="stylesheet" href="styles/rafting.css">
</head>

<body class="home">
<header>
  <img src="images/logo.jpg" alt="Rafting Logo" width="100">
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="trips.html">Trips</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<main>
  <div class="hero">
    <img src="images/rafting2.jpg" alt="Rafting Adventure">
    <h1>Experience the Adventure</h1>
  </div>

  <section class="cta">
    <h2>Ready for your next adventure?</h2>
    <a href="trips.html">Explore Our Trips</a>
  </section>

  <section class="newsletter">
    <h2>Join Our Newsletter</h2>
    <form>
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>

      <button type="submit">Join Now</button>
    </form>
  </section>

  <section class="grid">
    <h2>Our Adventures</h2>
    <div>
      <img src="images/grand-canyon-final.jpg" alt="Rafting fun">
      <p>Enjoy exciting rafting trips with our expert guides.</p>
    </div>

    <div>
      <img src="images/spanish-fork-river.jpg" alt="Nature rafting">
      <p>Explore beautiful rivers and nature with us.</p>
    </div>
  </section>
</main>

<footer>
  <p>© 2026 White Water Rafting</p>
</footer>
</body>
</html>
