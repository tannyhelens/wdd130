<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>
    <meta name="description" content="Contact White Water Rafting for questions and reservations.">
    <meta name="author" content="Tanny Santos">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/logo.jpg" alt="White Water Rafting Company Logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>White Water Rafting Company</h1>

        <section class="company-info">
            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>+1 999 999 9999</p>
            <p>info@whitewater.com</p>
        </section>

        <section class="contact-grid">
            <div class="map-box">
                <iframe 
                    src="https://www.google.com/maps?q=Kolob,California&output=embed"
                    loading="lazy">
                </iframe>
            </div>

            <div class="contact-form">
                <form method="post">
                    <div class="form-row">
                        <label for="fullname">Name</label>
                        <input type="text" id="fullname" name="fullname" placeholder="Placeholder">
                    </div>

                    <div class="form-row">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Placeholder">
                    </div>

                    <div class="form-row purpose-row">
                        <p>Message Purpose</p>
                        <div class="radio-group">
                            <input type="radio" id="general" name="purpose" value="general">
                            <label for="general">General Inquiry</label>

                            <input type="radio" id="reservation" name="purpose" value="reservation">
                            <label for="reservation">Reservation Question</label>

                            <input type="radio" id="suggestion" name="purpose" value="suggestion">
                            <label for="suggestion">Website Suggestion</label>
                        </div>
                    </div>

                    <div class="form-row">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="4" placeholder="Type here"></textarea>
                    </div>

                    <div class="checkbox-row">
                        <label class="checkbox">
                            <input type="checkbox" id="subscribe" name="subscribe">
                            Please Subscribe me to the monthly newsletter
                        </label>
                    </div>

                    <button type="submit">Get in Touch!</button>
                </form>
            </div>
        </section>

        <section class="employees-section">
            <h2>We Are Here to Serve You</h2>
            <div class="employees">
                <figure>
                    <img src="images/employee2.jpg" alt="Employee profile 23">
                    <figcaption>Employee Profile</figcaption>
                </figure>
                <figure>
                    <img src="images/employee3.jpg" alt="Employee profile 2">
                    <figcaption>Employee Profile</figcaption>
                </figure>
                <figure>
                    <img src="images/employee4.jpg" alt="Employee profile 4">
                    <figcaption>Employee Profile</figcaption>
                </figure>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 White Water Rafting | Tanny Santos</p>
        <nav class="socialmedia">
            <a href="https://www.facebook.com">
                <img src="images/facebook-bw.svg" alt="Facebook Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin-bw.svg" alt="LinkedIn Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram-bw.svg" alt="Instagram Icon">
            </a>
        </nav>
    </footer>
</body>

</html>
